[install]
# Isolated linker keeps each package's own dependency tree separate (like npm),
# instead of bun's default hoisted/flattened resolution. Needed because
# @tanstack/start-plugin-core requires zod v4 internally while this project's
# own code uses zod v3 — hoisting collapses these into a single version and
# breaks whichever one loses, causing "prefault is not a function" errors.
linker = "isolated"
# 24h supply-chain guard: skip package versions published less than a day ago.
minimumReleaseAge = 86400
# Each entry bypasses the 24h guard for one package — confirm with the user
# before adding any.
minimumReleaseAgeExcludes = ["@lovable.dev/vite-tanstack-config", "@lovable.dev/mcp-js", "@lovable.dev/vite-plugin-dev-server-bridge", "@lovable.dev/vite-plugin-hmr-gate"]
